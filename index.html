<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>    
  <input type="file" id="file-input">
  <script>
    const fileInputElement = document.getElementById("file-input");
    fileInputElement.addEventListener("change", async function () {
      const fileList = Array
      .from(this.files);

      if (fileList.length > 1) {
        throw "Only 1 file"
      }
      
      const arrayBufferList = await Promise.all(fileList.map(file => new Promise((res) => {
        const reader = new FileReader();
        reader.onload = (event) => {
          res(/*new Uint8Array(event.target.result)*/ event.target.result);
        }
        reader.readAsArrayBuffer(file);
      })));
      
      const dataview = new DataView(arrayBufferList[0]);
      const firstUint32 = dataview.getUint32(0, false);
      if (firstUint32 == 0x27051956) {
        console.log(`0x${firstUint32.toString(16)} is magic number in u-boot header in big-endian (network byte order)`);
      }
      
    }, false);
  </script>
</body>
</html>
